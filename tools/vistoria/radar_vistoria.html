<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radar de Vistoria - SBJV</title>
    <!-- Fontes e ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b1120;
            /* Fundo escuro de radar */
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;

            /* Cores de Alerta */
            --safe-color: #10b981;
            /* Verde (Voando longe) */
            --warn-color: #eab308;
            /* Amarelo (Preparar Vistoria - 30 min) */
            --danger-color: #ef4444;
            /* Vermelho (VISTORIA AGORA! - 20 min) */
            --accent-color: #3b82f6;
            /* Azul (Destaques da UI) */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--panel-bg);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .header-title .material-icons {
            color: var(--accent-color);
            font-size: 28px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--safe-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-badge.scanning {
            color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.1);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: currentColor;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.875rem;
            padding: 0 4px;
        }

        .flight-card {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .flight-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: var(--safe-color);
        }

        /* Estágios de Alerta (Amarelo = 30 min, Vermelho = 20 min) */
        .flight-card.warning {
            border-color: rgba(234, 179, 8, 0.3);
            background-color: rgba(234, 179, 8, 0.05);
        }

        .flight-card.warning::before {
            background-color: var(--warn-color);
        }

        .flight-card.danger {
            border-color: var(--danger-color);
            background-color: rgba(239, 68, 68, 0.1);
            animation: borderBlink 1.5s infinite alternate;
        }

        .flight-card.danger::before {
            background-color: var(--danger-color);
        }

        .flight-main {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .flight-id {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .flight-id .material-icons {
            font-size: 20px;
            color: var(--text-muted);
        }

        .flight-tags {
            display: flex;
            gap: 8px;
        }

        .tag {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        .flight-telemetry {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 8px;
        }

        .telemetry-item {
            display: flex;
            flex-direction: column;
        }

        .telemetry-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .telemetry-value {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .flight-timer {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            min-width: 140px;
        }

        .timer-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .timer-value {
            font-size: 2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--safe-color);
        }

        .flight-card.warning .timer-value {
            color: var(--warn-color);
        }

        .flight-card.danger .timer-value {
            color: var(--danger-color);
        }

        .timer-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .flight-card.danger .timer-subtitle {
            color: var(--danger-color);
            font-weight: 700;
            animation: blink 1s infinite;
        }

        /* Modal/Overlay de Permissão de Áudio */
        #audioOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(11, 17, 32, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .overlay-card {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }

        .overlay-card .material-icons {
            font-size: 48px;
            color: var(--accent-color);
            margin-bottom: 16px;
        }

        .overlay-card h2 {
            margin: 0 0 12px 0;
        }

        .overlay-card p {
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 auto;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 60px;
        }

        .empty-state .material-icons {
            font-size: 64px;
            opacity: 0.2;
            margin-bottom: 16px;
        }

        /* Animações */
        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.5;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes borderBlink {
            0% {
                border-color: rgba(239, 68, 68, 0.3);
                box-shadow: 0 0 0 rgba(239, 68, 68, 0);
            }

            100% {
                border-color: rgba(239, 68, 68, 1);
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            }
        }

        /* Controles de Teste (Escondidos na Produção) */
        .debug-panel {
            background: #000;
            padding: 10px;
            font-size: 12px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .debug-panel button {
            background: #333;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Overlay de Autorização Sonora (Navegadores bloqueiam áudio automático) -->
    <div id="audioOverlay">
        <div class="overlay-card">
            <span class="material-icons">campaign</span>
            <h2>Radar de Vistoria</h2>
            <p>O painel precisa de permissão para tocar o alarme sonoro quando as aeronaves atingirem o marco de 20
                minutos.</p>
            <button class="btn-primary" onclick="initSystem()">
                <span class="material-icons">play_arrow</span>
                Iniciar Monitoramento
            </button>
        </div>
    </div>

    <header>
        <div class="header-title">
            <span class="material-icons">radar</span>
            <h1>Radar Pista <b>SBJV</b></h1>
        </div>
        <div class="status-badge" id="connStatus">
            <div class="pulse-dot"></div>
            <span>Aguardando...</span>
        </div>
    </header>

    <main>
        <div class="info-bar">
            <span id="lastUpdate">Última varredura: --:--</span>
            <span>Raio de Busca: 150km</span>
        </div>

        <div id="flightsContainer">
            <!-- Os cards dos voos serão injetados aqui via JS -->
            <div class="empty-state">
                <span class="material-icons">flight_takeoff</span>
                <p>Nenhuma aeronave em aproximação detectada no raio atual.</p>
            </div>
        </div>
    </main>

    <!-- Som do Alarme (Usando um bip base64 curtinho para não depender de arquivo externo) -->
    <audio id="alarmSound" loop>
        <source
            src="data:audio/mp3;base64,//OExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq/zhGQAAKwAEWgAAAACvAAEA/2H/wQEEAf/4gAAgAAIAAgAAAAD///+B/////////8H//////3/////////4H/////4////+A////+A/////"
            type="audio/mpeg">
    </audio>

    <!-- Painel de Testes do Desenvolvedor -->
    <div class="debug-panel">
        <button onclick="injectMockFlight('safe')">Testar Longe</button>
        <button onclick="injectMockFlight('warning')">Testar 30 Min</button>
        <button onclick="injectMockFlight('danger')">Testar 20 Min (Alarme!)</button>
        <button onclick="clearFlights()">Limpar Tela</button>
    </div>

    <script>
        // CONFIGURAÇÕES GERAIS (Joinville SBJV)
        const CONFIG = {
            // URL do seu Google Apps Script (Proxy Oficial ADSB.lol)
            API_URL: "https://script.google.com/macros/s/AKfycbxA8m86rbcQzBY6J1Su_7sSrgJJP6irbdm1_ppZ7cGmNFiSv5r19maindRdfraiBwyaAw/exec",
            LAT: -26.2245,
            LON: -48.7974,
            UPDATE_INTERVAL: 10000,

            // Regras Matemáticas:
            AVG_APPROACH_SPEED: 400,
            TIME_WARNING: 30,
            TIME_DANGER: 20
        };

        // Bounding Box Visual (Aprox. 100km ao redor de Joinville)
        const BBOX = {
            lamin: -27.2000,
            lomin: -49.5000,
            lamax: -25.2000,
            lomax: -48.0000
        };

        let isMonitoring = false;
        let alarmTriggered = false;
        const alarmAudio = document.getElementById('alarmSound');
        const flightsContainer = document.getElementById('flightsContainer');
        const connStatus = document.getElementById('connStatus');

        // Memória de voos ativos
        let activeFlights = new Map();

        // 1. INICIALIZAÇÃO
        function initSystem() {
            document.getElementById('audioOverlay').style.display = 'none';
            alarmAudio.play().then(() => { alarmAudio.pause(); }).catch(e => console.log(e));

            isMonitoring = true;
            connStatus.classList.add('scanning');
            connStatus.querySelector('span').innerText = 'Monitorando...';

            fetchRadarData();
            setInterval(fetchRadarData, CONFIG.UPDATE_INTERVAL);
            setInterval(updateTimersDisplay, 1000);
        }

        // 2. BUSCA DE DADOS (Via Proxy GAS com OAuth2)
        async function fetchRadarData() {
            if (!isMonitoring) return;

            updateLastSweep();

            try {
                // O Proxy GAS já cuida do Bbox e do Token OAuth2
                const response = await fetch(CONFIG.API_URL);

                if (!response.ok) throw new Error(`Erro na API (${response.status})`);

                const data = await response.json();

                // O motor GAS repassa erros no campo 'error'
                if (data.error) throw new Error(data.message || 'Erro no Proxy');

                processTraffic(data.ac || []);

            } catch (error) {
                console.error("Erro na busca do radar via Proxy:", error);
                connStatus.classList.remove('scanning');
                connStatus.style.color = 'var(--danger-color)';
                connStatus.querySelector('span').innerText = 'Falha (' + error.message + ')';
            }
        }

        function updateLastSweep() {
            const now = new Date();
            document.getElementById('lastUpdate').innerText = `Atualizado: ${now.toLocaleTimeString('pt-BR')}`;
            connStatus.classList.add('scanning');
            connStatus.style.color = 'var(--safe-color)';
            connStatus.querySelector('span').innerText = 'Conectado';
        }

        // 3. PROCESSAMENTO DO TRÁFEGO (ADSB.lol JSON Format + Lógica de Rumo/Heading)
        function processTraffic(aircraftList) {
            let foundRelevant = false;
            const currentCallsigns = new Set();
            const now = Date.now();
        
            aircraftList.forEach(ac => {
                const flightId = (ac.flight && ac.flight.trim()) || (ac.hex ? `ID:${ac.hex.toUpperCase()}` : null);
                const altitude = ac.alt_baro ?? ac.alt_geom;
        
                if (!flightId || altitude === null || !ac.lat || !ac.lon) return;
        
                const callsign = flightId;
                const altFeet = altitude;
                const speedKmh = (ac.gs || 220) * 1.852;
                const track = ac.track || 0;
                const baroRate = ac.baro_rate ?? 0;
        
                const distKm = calculateDistance(CONFIG.LAT, CONFIG.LON, ac.lat, ac.lon);
                const bearingToAirport = calculateBearing(ac.lat, ac.lon, CONFIG.LAT, CONFIG.LON);
        
                let diffHeading = Math.abs(track - bearingToAirport);
                if (diffHeading > 180) diffHeading = 360 - diffHeading;
        
                // =============================
                // 🔹 CAMADA 1: DETECÇÃO LONGE (30min)
                // =============================
                const isInboundWide = diffHeading < 70;
                const isFar = distKm < 150;
                const isCruiseOrDescent = baroRate < 500;
        
                // =============================
                // 🔹 CAMADA 2: CONFIRMAÇÃO
                // =============================
                const isHeadingOk = diffHeading < 45;
                const isDescending = baroRate < -300;
        
                const maxAltAllowed = distKm * 300;
                const minAltAllowed = distKm * 50;
        
                const isAltitudeOk = altFeet < maxAltAllowed && altFeet > minAltAllowed;
        
                // =============================
                // 🔹 ETA INTELIGENTE (MAIS REAL)
                // =============================
                const adjustedSpeed = speedKmh * 0.75;
                let estMinutes = (distKm / adjustedSpeed) * 60 + 8;
        
                // =============================
                // 🔹 CONTROLE DE ESTADO
                // =============================
                const existing = activeFlights.get(callsign) || {
                    hits: 0,
                    stage: 'none'
                };
        
                let stage = existing.stage;
                let hits = existing.hits || 0;
        
                // 🟢 CANDIDATO (longe)
                if (isInboundWide && isFar && isCruiseOrDescent) {
                    hits++;
                    if (hits >= 3) stage = 'candidate';
                }
        
                // 🟡 CONFIRMADO
                if (isHeadingOk && isDescending && isAltitudeOk) {
                    stage = 'confirmed';
                }
        
                // 🔴 FINAL
                if (estMinutes <= CONFIG.TIME_DANGER) {
                    stage = 'final';
                }
        
                // ❌ IGNORA quem nunca virou candidato
                if (stage === 'none') return;
        
                currentCallsigns.add(callsign);
        
                activeFlights.set(callsign, {
                    hex: ac.hex || 'N/A',
                    callsign: callsign,
                    altFeet: Math.round(altFeet),
                    speedKmh: Math.round(speedKmh),
                    distKm: distKm.toFixed(1),
                    etaMinutes: estMinutes,
                    targetTime: existing.targetTime || new Date(now + estMinutes * 60000),
                    type: 'Aproximação',
                    lastSeen: now,
                    stage,
                    hits
                });
        
                foundRelevant = true;
            });
        
            // 🧹 Limpeza inteligente
            for (let [callsign, data] of activeFlights.entries()) {
                const age = now - (data.lastSeen || 0);
        
                // remove rápido se nunca confirmou
                if (data.stage === 'candidate' && age > 20000) {
                    activeFlights.delete(callsign);
                }
        
                // mantém confirmados mais tempo
                else if (age > 40000) {
                    activeFlights.delete(callsign);
                }
            }
        
            renderInterface();
            checkAlarms();
        }

        // Função para calcular o rumo (bearing) entre dois pontos
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1 * Math.PI / 180;
            const l2 = lat2 * Math.PI / 180;
            const dl = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2);
            const x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            let brng = Math.atan2(y, x);
            return (brng * 180 / Math.PI + 360) % 360;
        }

        // 4. ATUALIZAÇÃO DA TELA
        function renderInterface() {
            if (activeFlights.size === 0) {
                flightsContainer.innerHTML = `
                    <div class="empty-state">
                        <span class="material-icons">radar</span>
                        <p>Nenhuma aproximação detectada no espaço aéreo local.</p>
                    </div>`;
                return;
            }

            flightsContainer.innerHTML = '';

            // Ordena do mais próximo pro mais longe
            const sortedFlights = Array.from(activeFlights.values()).sort((a, b) => a.etaMinutes - b.etaMinutes);

            sortedFlights.forEach(flight => {
                // Calcula os minutos e segundos restantes até o pouso simulado
                const tRemainingMs = flight.targetTime - new Date();
                const m = Math.max(0, Math.floor(tRemainingMs / 60000));
                const s = Math.max(0, Math.floor((tRemainingMs % 60000) / 1000));
                const timeStr = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

                let cardClass = '';
                let timerLabel = 'RESTANTE';
                let timerSubtitle = 'MONITORANDO';
                
                // NOVO: usa stage real
                if (flight.stage === 'candidate') {
                    timerSubtitle = 'MONITORANDO';
                }
                
                if (flight.stage === 'confirmed') {
                    cardClass = 'warning';
                    timerSubtitle = 'APROXIMAÇÃO';
                }
                
                if (flight.stage === 'final') {
                    cardClass = 'danger';
                    timerLabel = 'VISTORIA!';
                    timerSubtitle = 'VÁ PARA PISTA';
                }

                const cardHtml = `
                    <div class="flight-card ${cardClass}" id="card-${flight.callsign}">
                        <div class="flight-main">
                            <div class="flight-id">
                                <span class="material-icons">flight_land</span>
                                ${flight.callsign}
                            </div>
                            <div class="flight-tags">
                                <span class="tag">${flight.type}</span>
                                <span class="tag">HEX: ${flight.hex}</span>
                            </div>
                            
                            <div class="flight-telemetry">
                                <div class="telemetry-item">
                                    <span class="telemetry-label">Distância</span>
                                    <span class="telemetry-value">${flight.distKm} km</span>
                                </div>
                                <div class="telemetry-item">
                                    <span class="telemetry-label">Altitude</span>
                                    <span class="telemetry-value">${flight.altFeet} ft</span>
                                </div>
                                <div class="telemetry-item">
                                    <span class="telemetry-label">Velocidade</span>
                                    <span class="telemetry-value">${flight.speedKmh} km/h</span>
                                </div>
                            </div>
                        </div>

                        <div class="flight-timer">
                            <span class="timer-label">${timerLabel}</span>
                            <span class="timer-value">${timeStr}</span>
                            <span class="timer-subtitle">${timerSubtitle}</span>
                        </div>
                    </div>
                `;
                flightsContainer.innerHTML += cardHtml;
            });
        }

        // Relógio regressivo secundário (não bate na API, só reduz os segundos na tela)
        function updateTimersDisplay() {
            if (activeFlights.size === 0) return;
            renderInterface(); // Rerender rápido
            checkAlarms();
        }

        // 5. SISTEMA DE ALARME (Grito de 20 minutos)
        function checkAlarms() {
            let shouldRing = false;
        
            for (let flight of activeFlights.values()) {
                const tRemainingMs = flight.targetTime - new Date();
                const minutesLeft = Math.floor(tRemainingMs / 60000);
        
                if (flight.stage === 'final' && minutesLeft > 0) {
                    shouldRing = true;
                    break;
                }
            }
        
            if (shouldRing && !alarmTriggered) {
                alarmAudio.play().catch(() => {});
                alarmTriggered = true;
            } else if (!shouldRing && alarmTriggered) {
                alarmAudio.pause();
                alarmAudio.currentTime = 0;
                alarmTriggered = false;
            }
        }

        // ==========================================
        // FUNÇÕES MATEMÁTICAS E DE DESENVOLVEDOR
        // ==========================================

        // Fórmula de Haversine para Distância em Km entre duas Coordenadas
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Raio da Terra em km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // Mocks para o Desenvolvedor (Injetar voos falsos)
        function injectMockFlight(level) {
            let min = 40;
            if (level === 'warning') min = 28;
            if (level === 'danger') min = 15;

            const mockCallsign = 'LA' + Math.floor(Math.random() * 9000);

            activeFlights.set(mockCallsign, {
                hex: 'MOCK',
                callsign: mockCallsign,
                altFeet: 12500,
                speedKmh: 420,
                distKm: (min * 7).toFixed(1),
                etaMinutes: min,
                targetTime: new Date(Date.now() + (min * 60000)),
                type: 'Aproximação',
                isMock: true
            });
            renderInterface();
            checkAlarms();
        }

        function clearFlights() {
            activeFlights.clear();
            renderInterface();
            checkAlarms();
        }

    </script>
